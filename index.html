<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4gms</title>

<style>

/* ===== RESET ===== */
* { box-sizing: border-box; }

/* ===== FOND ===== */
body {
  margin: 0;
  background: url("https://cdn.wallpapersafari.com/53/93/E176sT.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: -2;
}

#particles {
  position: fixed;
  inset: 0;
  z-index: -1;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: pointer;
  transition: opacity 0.8s ease;
}

#intro h2 {
  font-size: 28px;
  text-align: center;
  padding: 20px;
  text-shadow: 0 0 10px #fff, 0 0 20px #fff;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* ===== CONTENU ===== */
#main-content {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1s ease, transform 1s ease;
  padding: 140px 20px 60px;
  text-align: center;
}

/* ===== PROFIL ===== */
.profile-container {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  z-index: 10;
}

.profile-container img {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  transition: 0.4s;
}

.profile-container img:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px #fff;
}

/* ===== NOM + BADGES ===== */
.name-section {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.name-row h1 {
  font-size: 26px;
  margin: 0;
  animation: strongGlow 2.5s infinite alternate;
}

@keyframes strongGlow {
  from { text-shadow: 0 0 8px #fff, 0 0 15px #fff; }
  to { text-shadow: 0 0 15px #fff, 0 0 30px #fff, 0 0 45px #fff; }
}

/* ===== BADGES ===== */
.badge {
  font-size: 14px;
  padding: 3px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(5px);
  animation: badgeGlow 3s infinite alternate;
}

@keyframes badgeGlow {
  from { box-shadow: 0 0 5px #fff; }
  to { box-shadow: 0 0 15px #fff; }
}

/* ===== BIO ===== */
.bio {
  font-size: 13px;
  opacity: 0.85;
  margin-top: 4px;
  text-align: right;
  animation: bioGlow 4s infinite alternate;
}

@keyframes bioGlow {
  from { text-shadow: 0 0 5px #fff; }
  to { text-shadow: 0 0 12px #fff; }
}

/* ===== PREMIUM CARD ===== */
.buttons-wrapper {
  max-width: 340px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 25px rgba(255,255,255,0.1);
}

/* ===== BOUTONS ===== */
a {
  display: block;
  margin: 15px auto;
  padding: 14px 0;
  width: 100%;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
}

a.fade-in {
  opacity: 1;
  transform: translateY(0);
}

a:hover {
  border: 1px solid #fff;
  box-shadow: 0 0 15px #fff;
  transform: translateY(-3px);
}

/* ===== SPOTIFY CARD ===== */
.spotify-wrapper {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 15px rgba(255,255,255,0.08);
}

/* ===== MUTE BUTTON ===== */
#mute-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  color: white;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 10px #fff;
  transition: 0.3s;
}

#mute-btn:hover {
  box-shadow: 0 0 25px #fff;
  transform: scale(1.1);
}

/* ===== COMPTEUR ===== */
#view-counter {
  position: fixed;
  bottom: 15px;
  left: 15px;
  font-size: 13px;
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 6px;
  text-shadow: 0 0 5px #fff;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="intro">
  <h2>Click to enter...</h2>
</div>

<div id="main-content">

<div class="profile-container">
  <img src="https://shapes.inc/api/public/avatar/itoshirinilovekei">
  
  <div class="name-section">
    <div class="name-row">
      <h1>4gms</h1>
      <span class="badge">✔ Verified</span>
      <span class="badge">🔥 Premium</span>
      <span class="badge">🎧 Music</span>
    </div>
    <div class="bio">16 yo student, US & Fr</div>
  </div>
</div>

<div class="buttons-wrapper">
  <a href="https://instagram.com/ga_etan12" target="_blank">Instagram</a>
  <a href="https://guns.lol/upv9" target="_blank">Guns.lol</a>
  <a href="https://paypal.me/agrumes12" target="_blank">Paypal</a>
  <a href="https://discord.gg/zyBmkPyw" target="_blank">Contact</a>

  <div class="spotify-wrapper">
    <iframe id="spotify-player"
      style="border-radius:12px"
      src="https://open.spotify.com/embed/track/4k3xDpAdBuM17mNNHhOZkK?utm_source=generator"
      width="100%"
      height="80"
      frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>

</div>
</div>

<button id="mute-btn">🔊</button>

<div id="view-counter">
  👁 <span id="views">0</span>
</div>

<script>

/* INTRO */
const intro = document.getElementById("intro");
const main = document.getElementById("main-content");
const buttons = main.querySelectorAll("a");
const spotify = document.getElementById("spotify-player");
const muteBtn = document.getElementById("mute-btn");

let muted = false;

function showContent() {
  intro.style.opacity = "0";
  setTimeout(() => {
    intro.style.display = "none";
    main.style.opacity = "1";
    main.style.transform = "translateY(0)";
    buttons.forEach((btn, i) => {
      setTimeout(() => btn.classList.add("fade-in"), i * 150);
    });
    spotify.src += "&autoplay=1";
  }, 800);
}

intro.addEventListener("click", showContent);

muteBtn.addEventListener("click", () => {
  if (!muted) {
    spotify.src = spotify.src.replace("&autoplay=1", "");
    muteBtn.textContent = "🔇";
    muted = true;
  } else {
    spotify.src += "&autoplay=1";
    muteBtn.textContent = "🔊";
    muted = false;
  }
});

/* COMPTEUR */
let views = localStorage.getItem("page_views");
views = views ? parseInt(views) + 1 : 1;
localStorage.setItem("page_views", views);
document.getElementById("views").textContent = views;

/* PARTICULES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    speedY: Math.random() * 0.5 + 0.2
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.y += p.speedY;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>
</body>
</html>
