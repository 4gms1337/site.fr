<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>4gms</title>

<style>

/* ===== RESET ===== */
* { box-sizing: border-box; }

body {
  margin: 0;
  background: url("https://cdn.wallpapersafari.com/53/93/E176sT.jpg") no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: -2;
}

#particles {
  position: fixed;
  inset: 0;
  z-index: -1;
}

/* ===== INTRO ===== */
#intro {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: pointer;
  transition: opacity 0.8s ease;
}

#intro h2 {
  font-size: 28px;
  text-shadow: 0 0 15px #ff0000;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

/* ===== CONTENU ===== */
#main-content {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 1s ease, transform 1s ease;
  padding: 140px 20px 60px;
  text-align: center;
}

/* ===== PROFIL ===== */
.profile-container {
  position: absolute;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 15px;
  z-index: 10;
  transition: transform 0.2s ease;
  transform-style: preserve-3d;
  flex-wrap: wrap;
}

.avatar-wrapper {
  position: relative;
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}

.avatar-wrapper img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  z-index: 2;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid #ff0000;
  box-shadow: 0 0 15px #ff0000;
  animation: ringPulse 2.5s infinite alternate;
  z-index: 1;
}

.avatar-ring.active {
  animation: ringActive 1s infinite alternate;
}

@keyframes ringPulse {
  from { box-shadow: 0 0 10px #ff0000; }
  to { box-shadow: 0 0 25px #ff0000; }
}

@keyframes ringActive {
  from { box-shadow: 0 0 20px #ff0000; }
  to { box-shadow: 0 0 40px #ff0000; }
}

/* ===== NOM + BADGE + BIO ===== */
.name-section {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-width: 120px;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.name-row h1 {
  font-size: 26px;
  margin: 0;
  color: #ff2a2a;
  animation: redGlow 2s infinite alternate;
  white-space: nowrap;
}

/* Badge diamant */
.badge {
  width: 22px;
  height: 22px;
  filter: drop-shadow(0 0 6px #ff0000);
  transition: transform 0.3s ease, filter 0.3s ease;
  cursor: default;
  flex-shrink: 0;
}

.badge:hover {
  transform: scale(1.2);
  filter: drop-shadow(0 0 12px #ff0000);
}

@keyframes redGlow {
  from { text-shadow: 0 0 10px #ff0000; }
  to { text-shadow: 0 0 30px #ff0000, 0 0 50px #ff0000; }
}

.bio {
  font-size: 13px;
  margin-top: 4px;
  opacity: 0.9;
  text-shadow: 0 0 10px #ff0000;
  max-width: 240px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ===== CARD ===== */
.buttons-wrapper {
  max-width: 340px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,0,0,0.4);
  box-shadow: 0 0 25px rgba(255,0,0,0.3);
}

a {
  display: block;
  margin: 15px auto;
  padding: 14px 0;
  width: 100%;
  color: #fff;
  font-weight: bold;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid rgba(255,0,0,0.6);
  background: rgba(255,0,0,0.05);
  transition: 0.3s;
  opacity: 0;
  transform: translateY(20px);
}

a.fade-in {
  opacity: 1;
  transform: translateY(0);
}

a:hover {
  box-shadow: 0 0 20px #ff0000;
  transform: translateY(-3px);
}

.spotify-wrapper {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,0,0,0.05);
  border: 1px solid rgba(255,0,0,0.4);
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

#mute-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 1px solid rgba(255,0,0,0.8);
  background: rgba(255,0,0,0.1);
  color: #ff4d4d;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 0 20px #ff0000;
  transition: 0.3s;
}

#mute-btn:hover {
  box-shadow: 0 0 35px #ff0000;
  transform: scale(1.1);
}

#view-counter {
  position: fixed;
  bottom: 15px;
  left: 15px;
  font-size: 13px;
  text-shadow: 0 0 10px #ff0000;
}

/* ===== MOBILE ===== */
@media (max-width: 480px) {
  .profile-container {
    top: 15px;
    left: 15px;
    gap: 10px;
  }

  .avatar-wrapper {
    width: 65px;
    height: 65px;
  }

  .name-row h1 {
    font-size: 22px;
  }

  .badge {
    width: 18px;
    height: 18px;
  }

  .bio {
    max-width: 140px;
    font-size: 12px;
  }

  #main-content {
    padding-top: 120px;
  }
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div id="intro">
  <h2>Click to enter...</h2>
</div>

<div id="main-content">

  <div class="profile-container" id="profile-card">
    <div class="avatar-wrapper">
      <div class="avatar-ring active" id="ring"></div>
      <img src="https://shapes.inc/api/public/avatar/itoshirinilovekei" alt="Avatar 4gms" />
    </div>

    <div class="name-section">
      <div class="name-row">
        <h1>4gms</h1>
        <img src="https://i.imgur.com/bAksQvJ.png" alt="Badge diamant" class="badge" />
      </div>
      <div class="bio">16 yo student, US & Fr</div>
    </div>
  </div>

  <div class="buttons-wrapper">
    <a href="https://instagram.com/ga_etan12" target="_blank">Instagram</a>
    <a href="https://guns.lol/upv9" target="_blank">Guns.lol</a>
    <a href="https://paypal.me/agrumes12" target="_blank">Paypal</a>
    <a href="https://discord.gg/zyBmkPyw" target="_blank">Contact</a>

    <div class="spotify-wrapper">
      <iframe id="spotify-player"
        style="border-radius:12px"
        src="https://open.spotify.com/embed/track/4k3xDpAdBuM17mNNHhOZkK?utm_source=generator&autoplay=1"
        width="100%"
        height="80"
        frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>
  </div>

</div>

<button id="mute-btn" aria-label="Mute/Unmute volume">🔊</button>

<div id="view-counter">
  👁 <span id="views">0</span>
</div>

<script>

const intro = document.getElementById("intro");
const main = document.getElementById("main-content");
const buttons = main.querySelectorAll("a");
const spotify = document.getElementById("spotify-player");
const muteBtn = document.getElementById("mute-btn");
const card = document.getElementById("profile-card");

let muted = false;

function showContent() {
  intro.style.opacity = "0";
  setTimeout(() => {
    intro.style.display = "none";
    main.style.opacity = "1";
    main.style.transform = "translateY(0)";
    buttons.forEach((btn, i) => {
      setTimeout(() => btn.classList.add("fade-in"), i * 150);
    });
  }, 800);
}

intro.addEventListener("click", showContent);

/* MUTE */
muteBtn.addEventListener("click", () => {
  if (!muted) {
    spotify.src = spotify.src.replace("&autoplay=1", "");
    muteBtn.textContent = "🔇";
    muted = true;
  } else {
    spotify.src += "&autoplay=1";
    muteBtn.textContent = "🔊";
    muted = false;
  }
});

/* 3D EFFECT */
document.addEventListener("mousemove", (e) => {
  const x = (window.innerWidth / 2 - e.pageX) / 40;
  const y = (window.innerHeight / 2 - e.pageY) / 40;
  card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* Compteur */
let views = localStorage.getItem("page_views");
views = views ? parseInt(views) + 1 : 1;
localStorage.setItem("page_views", views);
document.getElementById("views").textContent = views;

/* Particules */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 40; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 1.5,
    speedY: Math.random() * 0.5 + 0.2
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.y += p.speedY;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,0,0,0.3)";
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

</script>
</body>
</html>
